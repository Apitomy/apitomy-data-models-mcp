name: Publish Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apitomy'

    steps:
      - name: Checkout apitomy-data-models-mcp
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.6'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs>=1.5.0
          pip install mkdocs-material>=9.0.0
          pip install pymdown-extensions

      - name: Build documentation
        run: mkdocs build --strict

      - name: Checkout website repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Apitomy/apitomy.github.io
          token: ${{ secrets.ACCESS_TOKEN }}
          path: website

      - name: Copy generated docs to website
        run: |
          rm -rf website/projects/data-models-mcp/docs
          mkdir -p website/projects/data-models-mcp
          cp -r site website/projects/data-models-mcp/docs

      - name: Commit and push to website
        run: |
          cd website
          git config user.name "apitomy-ci"
          git config user.email "apitomy.ci@gmail.com"
          git add projects/data-models-mcp/docs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Data Models MCP documentation (automated)"
            git push
          fi
